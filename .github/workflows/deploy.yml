name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp -r dist prisma package.json package-lock.json ecosystem.config.js artifact/
          cp -r templates artifact/ 2>/dev/null || true
          tar -czf backend.tar.gz -C artifact .

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend.tar.gz"
          target: "/home/${{ secrets.SSH_USER }}/deploy/"
          overwrite: true

      - name: Extract & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/${{ secrets.SSH_USER }}/lottus-backend
            mkdir -p "$APP_DIR/uploads" "$APP_DIR/logs"
            tar -xzf /home/${{ secrets.SSH_USER }}/deploy/backend.tar.gz -C "$APP_DIR"
            cd "$APP_DIR"
            # Keep existing .env on the server — never overwrite
            if [ ! -f .env ]; then
              echo "⚠️  Missing .env on server — please create it from .env.example"
              exit 1
            fi
            npm ci --omit=dev
            npx prisma migrate deploy
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save
            rm -f /home/${{ secrets.SSH_USER }}/deploy/backend.tar.gz
            echo "✅ Deploy complete"
